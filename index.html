<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>تسجيل الدخول</h2>
        <input type="email" id="email-input" placeholder="البريد الإلكتروني">
        <button id="send-btn" onclick="startVerification()">إرسال الرمز</button>
        
        <div id="otp-container" class="hidden">
            <input type="text" id="otp-input" placeholder="أدخل رمز التحقق">
            <button onclick="handleVerify()">تحقق</button>
        </div>
        <p id="status-msg"></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
