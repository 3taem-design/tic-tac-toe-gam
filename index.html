<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AX Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box">
            <h2>تسجيل الدخول</h2>
            <input type="email" id="email-input" placeholder="البريد الإلكتروني">
            <button id="send-btn" onclick="startVerification()">إرسال الرمز</button>
            <div id="otp-container" class="hidden">
                <input type="text" id="otp-input" placeholder="رمز التحقق">
                <button onclick="handleVerify()">تحقق</button>
            </div>
            <p id="status-msg"></p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="top-bar">
            <span>AX Tools</span>
            <button onclick="logout()" class="btn-out">خروج</button>
        </header>

        <main class="grid-container">
            <div class="card"><span>🕹️</span>تيك تاك تو</div>
            <div class="card"><span>☁️</span>محمل المقاطع</div>
            <div class="card"><span>🧠</span>الذاكرة</div>
            <div class="card"><span>🎲</span>الدومينو</div>
            <div class="card"><span>♟️</span>الشطرنج</div>
            <div class="card"><span>🔢</span>تخمين الأرقام</div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item">ℹ️<br>المزيد</div>
            <div class="nav-item">🎮<br>الألعاب</div>
            <div class="nav-item">📧<br>إيميل</div>
            <div class="nav-item">📁<br>الملفات</div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
