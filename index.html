<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="top-bar">
        <span id="status-badge" class="badge">متصل</span>
        <h4 id="page-title">AX Tools</h4>
    </div>

    <div id="tools-screen" class="app-screen">
        <div class="content"><h3>الأدوات</h3><p>قريباً...</p></div>
    </div>

    <div id="emails-screen" class="app-screen hidden">
        <div class="content"><h3>الإيميلات</h3></div>
    </div>

    <div id="games-screen" class="app-screen hidden">
        <div class="content" id="game-container">
            <div class="xo-board" id="board">
                <div class="cell" onclick="makeMove(0)"></div><div class="cell" onclick="makeMove(1)"></div><div class="cell" onclick="makeMove(2)"></div>
                <div class="cell" onclick="makeMove(3)"></div><div class="cell" onclick="makeMove(4)"></div><div class="cell" onclick="makeMove(5)"></div>
                <div class="cell" onclick="makeMove(6)"></div><div class="cell" onclick="makeMove(7)"></div><div class="cell" onclick="makeMove(8)"></div>
            </div>
        </div>
    </div>

    <div id="about-screen" class="app-screen hidden">
        <div class="content"><h3>المزيد</h3><p>تطوير: سمير</p></div>
    </div>

    <nav class="bottom-nav">
        <button onclick="switchScreen('tools')"><i class="fas fa-tools"></i></button>
        <button onclick="switchScreen('emails')"><i class="fas fa-envelope"></i></button>
        <button onclick="switchScreen('games')"><i class="fas fa-gamepad"></i></button>
        <button onclick="switchScreen('about')"><i class="fas fa-ellipsis-h"></i></button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
