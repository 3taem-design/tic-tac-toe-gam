<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-bar">
        <span>AX Tools</span>
        <span class="status-badge">متصل</span>
    </header>

    <main id="main-grid" class="grid-container">
        <div class="card" onclick="loadGame('xo')">
            <img src="https://cdn-icons-png.flaticon.com/512/2040/2040774.png" alt="XO">
            <p>تيك تاك تو</p>
        </div>
        <div class="card"><img src="https://cdn-icons-png.flaticon.com/512/3061/3061342.png" alt="Cloud"><p>التحميلات</p></div>
        <div class="card"><img src="https://cdn-icons-png.flaticon.com/512/2965/2965279.png" alt="Memory"><p>الذاكرة</p></div>
    </main>

    <div id="game-wrapper" class="hidden">
        <button onclick="backToGrid()">رجوع</button>
        <div id="game-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
