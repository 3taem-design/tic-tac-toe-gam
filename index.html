<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box">
            <h2>AX Tools</h2>
            <input type="email" id="email-input" placeholder="البريد الإلكتروني">
            <button id="send-btn" onclick="startVerification()">إرسال الرمز</button>
            <div id="otp-container" class="hidden">
                <input type="text" id="otp-input" placeholder="أدخل رمز التحقق">
                <button onclick="handleVerify()">تحقق</button>
            </div>
            <p id="status-msg"></p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="top-bar">
            <span>AX Tools</span>
            <div class="user-icon">👤</div>
        </header>
        <div class="welcome-banner">
            <p>مرحباً، <span id="user-email-display">المستخدم</span></p>
            <small>✓ تم التحقق</small>
        </div>
        <main class="grid-container">
            <div class="card" onclick="loadGame('xo')">🎮 <strong>XO</strong><br><small>لعبة الأذكياء</small></div>
            <div class="card">☁️ <strong>Downloader</strong><br><small>تحميل سريع</small></div>
            <div class="card">🧩 <strong>Brain</strong><br><small>تحديات</small></div>
            <div class="card">🎵 <strong>Sounds</strong><br><small>أدوات صوت</small></div>
            <div class="card">📈 <strong>Analytics</strong><br><small>إحصائيات</small></div>
            <div class="card">📁 <strong>Files</strong><br><small>مدير الملفات</small></div>
        </main>
        <nav class="bottom-nav">
            <div class="nav-item">🏠<br>الرئيسية</div>
            <div class="nav-item">👥<br>الاجتماعي</div>
            <div class="nav-item">👤<br>الملف</div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
