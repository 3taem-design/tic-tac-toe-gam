<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="auth-screen" class="app-screen">
        <div class="auth-box">
            <h2>تسجيل الدخول</h2>
            <div id="login-fields">
                <input type="email" id="email-input" placeholder="البريد الإلكتروني">
                <button id="send-btn" onclick="startVerification()">إرسال رمز التحقق</button>
            </div>
            <p id="status-msg" style="color: var(--primary); margin: 10px 0;"></p>
            <div id="otp-container" class="hidden">
                <input type="text" id="otp-input" placeholder="أدخل الرمز (مثال: 123456)">
                <button onclick="handleVerify()">تأكيد الرمز</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div id="top-bar"><span>AX Tools</span><span class="badge">متصل</span></div>
        <main id="main-grid" class="grid-container">
            <div class="card" onclick="loadGame('xo')"><i class="fas fa-gamepad"></i><p>X-O</p></div>
        </main>
        <div id="game-wrapper" class="hidden"><div id="game-container"></div></div>
        <nav class="bottom-nav">
            <a class="nav-btn" onclick="backToGrid()"><i class="fas fa-th-large"></i><span>الألعاب</span></a>
            <a class="nav-btn"><i class="fas fa-envelope"></i><span>إيميل</span></a>
            <a class="nav-btn"><i class="fas fa-cog"></i><span>المزيد</span></a>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
