<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AX-Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box">
            <h2>تسجيل الدخول</h2>
            <input type="email" id="email-input" placeholder="البريد الإلكتروني">
            <button id="send-btn" onclick="startVerification()">إرسال الرمز</button>
            <div id="otp-container" class="hidden">
                <input type="text" id="otp-input" placeholder="رمز التحقق">
                <button onclick="handleVerify()">تحقق</button>
            </div>
            <p id="status-msg"></p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="top-bar">
            <div onclick="confirmLogout()" style="cursor:pointer; font-size: 20px;">🚪</div>
            <div onclick="checkUpdate()" style="cursor:pointer; font-size: 20px;">🔄</div>
            <div id="status-badge" style="font-size: 12px;"><span style="color: #22c55e;">●</span> متصل</div>
        </header>
        <main class="grid-container">
            <div class="card"><span>🕹️</span>الألعاب</div>
            <div class="card"><span>☁️</span>محمل المقاطع</div>
            <div class="card"><span>🧠</span>ادوات</div>
            <div class="card"><span>🎲</span>الدومينو</div>
            <div class="card"><span>♟️</span>تداول</div>
            <div class="card"><span>🔢</span>ارقام أجنبية</div>
        </main>
        <nav class="bottom-nav">
    <div class="nav-item">
        <img src="icon/icon-home.png" class="nav-icon" alt="الرئيسية">
        <span>الرئيسية</span>
    </div>
    <div class="nav-item">
        <img src="icon/icon-files.png" class="nav-icon" alt="الملفات">
        <span>إدارة الملفات</span>
    </div>
    <div class="nav-item">
        <img src="icon/icon-email.png" class="nav-icon" alt="إيميل">
        <span>إيميل مؤقت</span>
    </div>
    <div class="nav-item">
        <img src="icon/icon-more.png" class="nav-icon" alt="المزيد">
        <span>المزيد</span>
    </div>
</nav>    </div>
    <script src="app.js"></script>
</body>
</html>
