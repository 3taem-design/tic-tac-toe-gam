<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="auth-screen" class="app-screen">
        <div class="auth-container">
            <h2>تسجيل الدخول</h2>
            <p>أدخل بريدك الإلكتروني لتلقي رمز التحقق</p>
            <input type="email" id="email-input" placeholder="example@gmail.com">
            <button id="login-btn" onclick="handleLogin()">إرسال الرمز</button>
            
            <div id="otp-container" class="hidden">
                <input type="text" id="otp-input" placeholder="أدخل الرمز المكون من 6 أرقام">
                <button id="verify-btn" onclick="handleVerify()">تحقق ودخول</button>
            </div>
        </div>
    </div>

    <div id="files-screen" class="app-screen hidden">
        <div class="header">
            <h3>ملفاتي المحملة</h3>
        </div>
        <div class="content">
            <div class="download-box">
                <h4><i class="fas fa-cloud-download-alt"></i> محمل المقاطع الذكي</h4>
                <p>يدعم يوتيوب، انستقرام، تيك توك، وسناب شات</p>
                <div class="input-group">
                    <input type="text" id="download-url" placeholder="ضع رابط المقطع هنا...">
                    <button class="action-btn"><i class="fas fa-download"></i></button>
                </div>
            </div>
            
            <div class="empty-state">
                <i class="fas fa-music"></i>
                <p>لا توجد ملفات محملة حالياً.</p>
            </div>
        </div>
    </div>

    <div id="youtube-screen" class="app-screen hidden">
        <iframe src="https://m.youtube.com" id="youtube-frame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div id="emails-screen" class="app-screen hidden">
        <div class="header"><h3>إيميل مؤقت</h3></div>
        <div class="content"><p>ميزة الإيميل المؤقت ستكون متاحة قريباً...</p></div>
    </div>

    <div id="games-screen" class="app-screen hidden">
        <div class="header"><h3>الألعاب</h3></div>
        <div class="content"><p>ميزة الألعاب والتحديات ستكون متاحة قريباً...</p></div>
    </div>

    <nav id="main-nav" class="bottom-nav hidden">
        <button class="nav-btn active" id="btn-files" onclick="switchScreen('files')">
            <i class="fas fa-folder"></i>
            <span>الملفات</span>
        </button>
        
        <button class="nav-btn" id="btn-youtube" onclick="switchScreen('youtube')">
            <i class="fab fa-youtube" style="color: #ff0000;"></i>
            <span>يوتيوب</span>
        </button>
        
        <button class="nav-btn" id="btn-emails" onclick="switchScreen('emails')">
            <i class="fas fa-envelope"></i>
            <span>إيميل مؤقت</span>
        </button>
        
        <button class="nav-btn" id="btn-games" onclick="switchScreen('games')">
            <i class="fas fa-gamepad"></i>
            <span>الألعاب</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
